<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CourseQ | Redirecting...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: #0f0f23;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .loader {
            text-align: center;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(99, 102, 241, 0.2);
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loader p {
            color: rgba(255,255,255,0.6);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <p>Redirecting to your dashboard...</p>
    </div>

    <script>
        (function() {
            // Handle token from URL params (Google OAuth callback)
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');
            if (token) {
                localStorage.setItem('token', token);
                localStorage.setItem('userType', params.get('userType') || 'student');
                localStorage.setItem('userId', params.get('userId') || '');
                localStorage.setItem('userName', decodeURIComponent(params.get('userName') || 'User'));
                window.history.replaceState({}, document.title, '/');
            }

            // Check auth and redirect
            const storedToken = localStorage.getItem('token');
            const userType = localStorage.getItem('userType');

            if (!storedToken) {
                window.location.href = '/login.html';
                return;
            }

            if (userType === 'adviser') {
                window.location.href = '/adviser-dashboard.html';
            } else {
                window.location.href = '/student-dashboard.html';
            }
        })();
    </script>
</body>
</html>
